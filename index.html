<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Love Story</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <h1 class="logo">💕 Our Love Story</h1>
        <ul class="nav-links">
          <li><a href="#timeline">Timeline</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <h2>Our Journey Together</h2>
        <p>A love story worth sharing</p>
      </div>
    </section>

    <!-- Timeline Section -->
    <section id="timeline" class="timeline-section">
      <div class="container">
        <h2>Our Timeline</h2>
        <div class="timeline" id="timeline-container">
          <p class="loading">Loading your timeline...</p>
        </div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="gallery-section">
      <div class="container">
        <h2>Our Memories</h2>
        <div class="gallery-grid" id="gallery-container">
          <p class="loading">Loading your memories...</p>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
      <div class="container">
        <h2>Get in Touch</h2>
        <p>Share your thoughts or send us a message</p>
        <form class="contact-form">
          <input type="text" placeholder="Your Name" required />
          <input type="email" placeholder="Your Email" required />
          <textarea placeholder="Your Message" rows="5" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 Our Love Story. Made with 💕</p>
      </div>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
